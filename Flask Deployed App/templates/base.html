<!doctype html>
<html lang="en">
<head>

    <meta name="viewport" content="width=device-width, initial-scale=1">
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.0-beta3/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <title>{% block pagetitle %}{% endblock pagetitle %}</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(135deg, #dcfce7 0%, #d1fae5 100%);
            min-height: 100vh;
            overflow-x: hidden;
        }
        /* Animated Background */
        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, #a7f3d0 0%, #86efac 50%, #6ee7b7 100%);
            z-index: -1;
            animation: gradientShift 15s ease infinite;
        }
        @keyframes gradientShift {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.8; }
        }
        /* Floating particles */
        .particle {
            position: fixed;
            width: 10px;
            height: 10px;
            background: rgba(255, 255, 255, 0.3);
            border-radius: 50%;
            pointer-events: none;
            animation: float 20s infinite;
            z-index: -1;
        }
        @keyframes float {
            0%, 100% { transform: translateY(0) translateX(0); opacity: 0; }
            10% { opacity: 1; }
            90% { opacity: 1; }
            100% { transform: translateY(-100vh) translateX(100px); opacity: 0; }
        }
        /* Bubble Gallery Layout */
        .bubble-gallery-bubble {
            position: fixed;
            border-radius: 50%;
            opacity: 0.5;
            z-index: -2;
            will-change: transform, opacity;
            animation: bubbleUp 16s linear infinite;
            animation-delay: -8s;
        }
        .bubble-gallery-bubble:nth-child(1) { left: 3vw; width: 135px; height: 135px; bottom: -120px; background: radial-gradient(circle at 30% 30%, #c3ec52 0%, #0ba29d 100%); animation-delay: -0s; }
        .bubble-gallery-bubble:nth-child(2) { left: 15vw; width: 80px; height: 80px; bottom: -80px; background: radial-gradient(#fcb69f 0%, #ffecd2 100%); animation-delay: -6s; }
        .bubble-gallery-bubble:nth-child(3) { left: 32vw; width: 190px; height: 190px; bottom: -150px; background: radial-gradient(#f3e7e9 0%, #e3eeff 100%); animation-delay: -12s; }
        .bubble-gallery-bubble:nth-child(4) { left: 48vw; width: 115px; height: 115px; bottom: -130px; background: radial-gradient(#74ebd5 0%, #9face6 100%); animation-delay: -18s; }
        .bubble-gallery-bubble:nth-child(5) { left: 62vw; width: 110px; height: 110px; bottom: -110px; background: radial-gradient(circle at 80% 60%, #f3e7e9 0%, #e3eeff 100%); animation-delay: -21s; }
        .bubble-gallery-bubble:nth-child(6) { left: 75vw; width: 160px; height: 160px; bottom: -120px; background: radial-gradient(#c3ec52 0%, #0ba29d 100%); animation-delay: -26s; }
        .bubble-gallery-bubble:nth-child(7) { left: 89vw; width: 90px; height: 90px; bottom: -100px; background: radial-gradient(#fcb69f 0%, #ffecd2 100%); animation-delay: -28s; }
        .bubble-gallery-bubble:nth-child(8) { left: 8vw; width: 95px; height: 95px; bottom: -100px; background: radial-gradient(circle at 40% 60%, #1f2937 0%, #065f46 100%); animation-delay: -3s; }
        .bubble-gallery-bubble:nth-child(9) { left: 22vw; width: 140px; height: 140px; bottom: -140px; background: radial-gradient(circle at 30% 30%, #0f172a 0%, #0b4f3a 100%); animation-delay: -7s; }
        .bubble-gallery-bubble:nth-child(10) { left: 38vw; width: 75px; height: 75px; bottom: -90px; background: radial-gradient(circle at 70% 40%, #1e293b 0%, #064e3b 100%); animation-delay: -11s; }
        .bubble-gallery-bubble:nth-child(11) { left: 53vw; width: 170px; height: 170px; bottom: -160px; background: radial-gradient(circle at 60% 60%, #0b132b 0%, #22543d 100%); animation-delay: -14s; }
        .bubble-gallery-bubble:nth-child(12) { left: 68vw; width: 105px; height: 105px; bottom: -110px; background: radial-gradient(circle at 50% 50%, #111827 0%, #0d9488 100%); animation-delay: -17s; }
        .bubble-gallery-bubble:nth-child(13) { left: 82vw; width: 130px; height: 130px; bottom: -130px; background: radial-gradient(circle at 40% 70%, #0a192f 0%, #0f766e 100%); animation-delay: -19s; }
        .bubble-gallery-bubble:nth-child(14) { left: 94vw; width: 85px; height: 85px; bottom: -100px; background: radial-gradient(circle at 60% 30%, #0b1220 0%, #065f46 100%); animation-delay: -21s; }
        .bubble-gallery-bubble:nth-child(15) { left: 12vw; width: 115px; height: 115px; bottom: -120px; background: radial-gradient(circle at 30% 60%, #0f172a 0%, #134e4a 100%); animation-delay: -23s; }
        .bubble-gallery-bubble:nth-child(16) { left: 28vw; width: 95px; height: 95px; bottom: -100px; background: radial-gradient(circle at 70% 70%, #111827 0%, #14532d 100%); animation-delay: -25s; }
        .bubble-gallery-bubble:nth-child(17) { left: 44vw; width: 150px; height: 150px; bottom: -150px; background: radial-gradient(circle at 40% 40%, #0a192f 0%, #0e7490 100%); animation-delay: -27s; }
        .bubble-gallery-bubble:nth-child(18) { left: 58vw; width: 90px; height: 90px; bottom: -100px; background: radial-gradient(circle at 60% 60%, #1f2937 0%, #065f46 100%); animation-delay: -29s; }
        .bubble-gallery-bubble:nth-child(19) { left: 72vw; width: 120px; height: 120px; bottom: -120px; background: radial-gradient(circle at 30% 30%, #0b132b 0%, #0b4f3a 100%); animation-delay: -31s; }
        .bubble-gallery-bubble:nth-child(20) { left: 86vw; width: 100px; height: 100px; bottom: -110px; background: radial-gradient(circle at 50% 50%, #0f172a 0%, #064e3b 100%); animation-delay: -33s; }
        .bubble-gallery-bubble:nth-child(21) { left: 6vw; width: 85px; height: 85px; bottom: -95px; background: radial-gradient(circle at 40% 40%, #0b132b 0%, #065f46 100%); animation-delay: -4s; }
        .bubble-gallery-bubble:nth-child(22) { left: 18vw; width: 120px; height: 120px; bottom: -130px; background: radial-gradient(circle at 60% 60%, #0a192f 0%, #0f766e 100%); animation-delay: -8s; }
        .bubble-gallery-bubble:nth-child(23) { left: 27vw; width: 100px; height: 100px; bottom: -110px; background: radial-gradient(circle at 50% 50%, #111827 0%, #0d9488 100%); animation-delay: -10s; }
        .bubble-gallery-bubble:nth-child(24) { left: 36vw; width: 140px; height: 140px; bottom: -140px; background: radial-gradient(circle at 30% 30%, #0f172a 0%, #14532d 100%); animation-delay: -12s; }
        .bubble-gallery-bubble:nth-child(25) { left: 49vw; width: 90px; height: 90px; bottom: -100px; background: radial-gradient(circle at 70% 70%, #0b1220 0%, #065f46 100%); animation-delay: -16s; }
        .bubble-gallery-bubble:nth-child(26) { left: 61vw; width: 130px; height: 130px; bottom: -135px; background: radial-gradient(circle at 40% 40%, #0a192f 0%, #0e7490 100%); animation-delay: -18s; }
        .bubble-gallery-bubble:nth-child(27) { left: 69vw; width: 110px; height: 110px; bottom: -115px; background: radial-gradient(circle at 60% 30%, #0f172a 0%, #134e4a 100%); animation-delay: -20s; }
        .bubble-gallery-bubble:nth-child(28) { left: 77vw; width: 95px; height: 95px; bottom: -100px; background: radial-gradient(circle at 50% 50%, #111827 0%, #0b4f3a 100%); animation-delay: -22s; }
        .bubble-gallery-bubble:nth-child(29) { left: 90vw; width: 150px; height: 150px; bottom: -150px; background: radial-gradient(circle at 30% 70%, #0b132b 0%, #0d9488 100%); animation-delay: -24s; }
        .bubble-gallery-bubble:nth-child(30) { left: 96vw; width: 80px; height: 80px; bottom: -90px; background: radial-gradient(circle at 60% 60%, #0a192f 0%, #065f46 100%); animation-delay: -26s; }
        @keyframes bubbleUp {
            0% { transform: translateY(0) scale(1) rotate(0deg);}
            60% { opacity: .55;}
            100% { transform: translateY(-120vh) scale(1.13) rotate(130deg); opacity: 0.2;}
        }
        /* Navigation */
        .navbar {
            background: rgba(5, 56, 11, 0.95) !important;
            backdrop-filter: blur(10px);
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
            padding: 1rem 2rem;
            transition: all 0.3s ease;
        }
        .navbar-brand {
            font-size: 1.5rem;
            font-weight: 700;
            color: #10b981 !important;
            display: flex;
            align-items: center;
            gap: 10px;
            transition: transform 0.3s ease;
        }
        .navbar-brand:hover {
            transform: scale(1.05);
        }
        .navbar-brand i {
            font-size: 2rem;
            animation: leafRotate 3s ease-in-out infinite;
        }
        @keyframes leafRotate {
            0%, 100% { transform: rotate(0deg); }
            50% { transform: rotate(10deg); }
        }
        .nav-link {
            color: rgba(255, 255, 255, 0.8) !important;
            font-weight: 500;
            margin: 0 0.5rem;
            padding: 0.5rem 1rem !important;
            border-radius: 8px;
            transition: all 0.3s ease;
            position: relative;
        }
        .nav-link::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 50%;
            width: 0;
            height: 2px;
            background: #10b981;
            transition: all 0.3s ease;
            transform: translateX(-50%);
        }
        .nav-link:hover {
            color: #10b981 !important;
            background: rgba(16, 185, 129, 0.1);
        }
        .nav-link:hover::after {
            width: 80%;
        }
        /* Cards */
        .card-modern {
            background: rgba(255, 255, 255, 0.95);
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            border: none;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            overflow: hidden;
            position: relative;
        }
        .card-modern::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, rgba(16, 185, 129, 0.1) 0%, rgba(5, 150, 105, 0.1) 100%);
            opacity: 0;
            transition: opacity 0.3s ease;
        }
        .card-modern:hover {
            transform: translateY(-10px) scale(1.02);
            box-shadow: 0 30px 80px rgba(0, 0, 0, 0.4);
        }
        .card-modern:hover::before {
            opacity: 1;
        }
        /* Buttons */
        .btn-modern {
            background: linear-gradient(135deg, #10b981 0%, #059669 100%);
            border: none;
            color: white;
            padding: 12px 30px;
            border-radius: 50px;
            font-weight: 600;
            font-size: 1rem;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(16, 185, 129, 0.4);
            position: relative;
            overflow: hidden;
        }
        .btn-modern::before {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            width: 0;
            height: 0;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.3);
            transform: translate(-50%, -50%);
            transition: width 0.6s, height 0.6s;
        }
        .btn-modern:hover::before {
            width: 300px;
            height: 300px;
        }
        .btn-modern:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 25px rgba(16, 185, 129, 0.6);
        }
        /* Footer */
        .footer-modern {
            background: rgba(4, 41, 8, 0.95);
            backdrop-filter: blur(10px);
            color: #f1f3f5;
            padding: 3rem 0 1rem 0;
            margin-top: 4rem;
        }
        .social-icon {
            width: 50px;
            height: 50px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            background: rgba(16, 185, 129, 0.2);
            border-radius: 50%;
            color: #10b981;
            font-size: 1.3rem;
            margin: 0 10px;
            transition: all 0.3s ease;
            border: 2px solid transparent;
        }
        .social-icon:hover {
            background: #10b981;
            color: white;
            transform: translateY(-5px) scale(1.1);
            border-color: #10b981;
            box-shadow: 0 8px 20px rgba(16, 185, 129, 0.4);
        }
        /* Animations */
        .fade-in {
            animation: fadeIn 0.8s ease-in;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .slide-in-left {
            animation: slideInLeft 0.8s ease-out;
        }
        @keyframes slideInLeft {
            from { opacity: 0; transform: translateX(-50px); }
            to { opacity: 1; transform: translateX(0); }
        }
        /* Image hover effects */
        .img-hover-zoom {
            overflow: hidden;
            border-radius: 15px;
        }
        .img-hover-zoom img {
            transition: transform 0.5s ease;
        }
        .img-hover-zoom:hover img {
            transform: scale(1.1) rotate(2deg);
        }
        /* Scrollbar */
        ::-webkit-scrollbar {
            width: 10px;
        }
        ::-webkit-scrollbar-track {
            background: rgba(5, 56, 11, 0.3);
        }
        ::-webkit-scrollbar-thumb {
            background: linear-gradient(135deg, #10b981 0%, #059669 100%);
            border-radius: 10px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: linear-gradient(135deg, #059669 0%, #047857 100%);
        }
    </style>
</head>
